<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <title>English College — Reset password</title>
  <link rel="stylesheet" href="/assets/css/dashboard.css">
  <script src="/assets/js/dashboard-config.js"></script>
</head>
<body>
  <div class="gate-root">
    <form class="gate-card" id="reset-form" autocomplete="off">
      <div class="brand-mark">
        <div class="brand-logo" aria-label="English College">
          <img class="brand-logo-img" src="/assets/img/cel-logo-multicolor.svg" alt="English College">
        </div>
      </div>
      <h1>Reset password</h1>
      <p class="gate-hint" id="reset-for">Set a new password.</p>
      <input type="password" id="reset-new" placeholder="New password" autocomplete="new-password" required>
      <input type="password" id="reset-confirm" placeholder="Confirm new password" autocomplete="new-password" required>
      <button type="submit" id="reset-submit">Set new password</button>
      <div class="gate-error" id="reset-err" role="alert" aria-live="polite"></div>
      <div class="gate-ok" id="reset-ok" role="status" aria-live="polite"></div>
      <a class="gate-link" href="/">Back to sign in</a>
      <noscript><p class="gate-hint">JavaScript is required.</p></noscript>
    </form>
  </div>
  <script>
  (function () {
    function sha256hex(s) {
      return crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)).then(function (b) {
        return Array.from(new Uint8Array(b)).map(function (x) { return x.toString(16).padStart(2, '0'); }).join('');
      });
    }
    function pwHashOf(pw) { return sha256hex(pw).then(sha256hex); }
    var DISPATCH_URL = (typeof window.CEL_DISPATCH_URL === 'string') ? window.CEL_DISPATCH_URL : '';

    function qp(name) { var m = location.search.match(new RegExp('[?&]' + name + '=([^&]+)')); return m ? decodeURIComponent(m[1]) : ''; }
    var email = qp('email'), exp = qp('exp'), sig = qp('sig');

    var form = document.getElementById('reset-form');
    var newEl = document.getElementById('reset-new');
    var confEl = document.getElementById('reset-confirm');
    var errEl = document.getElementById('reset-err');
    var okEl = document.getElementById('reset-ok');
    var submitEl = document.getElementById('reset-submit');
    var forEl = document.getElementById('reset-for');

    if (email) { forEl.textContent = 'Set a new password for ' + email + '.'; }
    if (!email || !exp || !sig) {
      errEl.textContent = 'This reset link is invalid or incomplete. Request a new one from the sign-in page.';
      submitEl.disabled = true;
    }

    function callProxy(payload) {
      return fetch(DISPATCH_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
        .then(function (resp) {
          return resp.json().catch(function () { return {}; }).then(function (j) {
            return { status: resp.status, ok: resp.ok && j.ok !== false, body: j };
          });
        });
    }
    function awaitRun(workflow) {
      var start = Date.now();
      function tick() {
        return callProxy({ action: 'poll', workflow: workflow }).then(function (r) {
          var run = (r.ok && r.body && r.body.run) ? r.body.run : null;
          if (!run || run.status !== 'completed') {
            if (Date.now() - start > 90000) return null;
            return new Promise(function (res) { setTimeout(function () { res(tick()); }, 3000); });
          }
          return run;
        });
      }
      return tick();
    }

    form.addEventListener('submit', function (ev) {
      ev.preventDefault();
      errEl.textContent = ''; okEl.textContent = '';
      if (!email || !exp || !sig) return;
      var nw = newEl.value, cf = confEl.value;
      if (!nw) return;
      if (nw !== cf) { errEl.textContent = 'Passwords do not match.'; return; }
      if (!DISPATCH_URL) { errEl.textContent = 'Reset is not configured yet. Contact your administrator.'; return; }
      submitEl.disabled = true;
      okEl.textContent = 'Saving…';
      pwHashOf(nw).then(function (h) {
        return callProxy({ action: 'dispatch', workflow: 'dashboard-reset-password.yml', inputs: { email: email, exp: exp, sig: sig, new_pw_hash: h } });
      }).then(function (r) {
        if (!r.ok) { var m = 'HTTP ' + r.status; if (r.body && r.body.error) m += ': ' + r.body.error; throw new Error(m); }
        return new Promise(function (res) { setTimeout(res, 2000); });
      }).then(function () {
        return awaitRun('dashboard-reset-password.yml');
      }).then(function (run) {
        if (run && run.conclusion === 'success') {
          okEl.textContent = '✓ Password updated. You can now sign in with your new password.';
        } else if (run) {
          errEl.textContent = '✗ Reset failed — the link may have expired. Request a new one.';
          submitEl.disabled = false;
        } else {
          errEl.textContent = 'Timed out — check again in a minute, or request a new link.';
          submitEl.disabled = false;
        }
      }).catch(function (err) {
        errEl.textContent = '✗ ' + err.message;
        submitEl.disabled = false;
      });
    });
  })();
  </script>
</body>
</html>
