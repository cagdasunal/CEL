<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <title>English College — Sign in</title>
  <link rel="stylesheet" href="/assets/css/dashboard.css">
  <script src="/assets/js/dashboard-config.js"></script>
</head>
<body>
  <div class="gate-root">
    <form class="gate-card" id="login-form" autocomplete="on">
      <div class="brand-mark">
        <div class="brand-logo" aria-label="English College">
          <img class="brand-logo-img" src="/assets/img/cel-logo-multicolor.svg" alt="English College">
        </div>
      </div>
      <h1>Internal dashboard</h1>
      <p class="gate-hint">Sign in with your email and password.</p>
      <input type="email" id="login-email" placeholder="Email" autocomplete="username" autofocus required>
      <input type="password" id="login-pw" placeholder="Password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
      <div class="gate-error" id="login-err" role="alert" aria-live="polite"></div>
      <noscript><p class="gate-hint">JavaScript is required.</p></noscript>
    </form>
  </div>
  <script>
  (function () {
    // The password is verified server-side by the cel-dashboard Worker, which
    // returns a signed session token. We store it in a persistent, Secure,
    // SameSite=Strict cookie so the sign-in survives reloads + restarts.
    function sha256hex(s) {
      return crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)).then(function (buf) {
        return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
      });
    }
    var DISPATCH_URL = (typeof window.CEL_DISPATCH_URL === 'string') ? window.CEL_DISPATCH_URL : '';

    function getReturn() {
      var m = location.search.match(/[?&]return=([^&]+)/);
      if (m) {
        try {
          var dec = decodeURIComponent(m[1]);
          if (dec.indexOf('/') === 0 && dec.indexOf('//') !== 0) return dec;
        } catch (_) {}
      }
      return '/admin/';
    }

    var loginForm = document.getElementById('login-form');
    var emailEl = document.getElementById('login-email');
    var pwEl = document.getElementById('login-pw');
    var errEl = document.getElementById('login-err');
    var btn = loginForm.querySelector('button[type="submit"]');

    loginForm.addEventListener('submit', function (ev) {
      ev.preventDefault();
      errEl.textContent = '';
      var email = emailEl.value.trim().toLowerCase();
      var pw = pwEl.value;
      if (!email || !pw) return;
      if (!DISPATCH_URL) { errEl.textContent = 'Sign-in is not configured yet.'; return; }
      if (btn) btn.disabled = true;
      // Send SHA256(password), never the plaintext. The Worker hashes again and
      // compares to the stored double-hash; the public hash can't be replayed.
      sha256hex(pw).then(function (inner) {
        return fetch(DISPATCH_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', email: email, inner: inner })
        });
      }).then(function (r) { return r.json().catch(function () { return {}; }); })
        .then(function (j) {
          if (j && j.ok && j.token) {
            document.cookie = 'cel_session=' + j.token + '; Max-Age=1209600; Path=/; Secure; SameSite=Strict';
            location.replace(getReturn());
          } else {
            errEl.textContent = 'Wrong email or password.';
            pwEl.value = '';
            pwEl.focus();
            if (btn) btn.disabled = false;
          }
        }).catch(function () {
          errEl.textContent = 'Could not sign in right now. Please try again.';
          if (btn) btn.disabled = false;
        });
    });
  })();
  </script>
</body>
</html>
