<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <title>English College — Sign in</title>
  <link rel="stylesheet" href="/assets/css/dashboard.css">
  <script src="/assets/js/dashboard-config.js"></script>
  <style>
    .gate-link { background: none; border: 0; color: #5b5bd6; cursor: pointer; font: inherit; text-decoration: underline; padding: 6px; }
    .gate-card[hidden] { display: none; }
    /* Make the sign-in error unmistakable (only when a message is present). */
    #login-err:not(:empty) {
      padding: 10px 12px;
      border: 1px solid var(--err);
      border-radius: var(--radius-sm);
      background: rgba(160, 38, 36, 0.09);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="gate-root">
    <form class="gate-card" id="login-form" autocomplete="on">
      <div class="brand-mark">
        <div class="brand-logo" aria-label="English College">
          <img class="brand-logo-img" src="/assets/img/cel-logo-multicolor.svg" alt="English College">
        </div>
      </div>
      <h1>Internal dashboard</h1>
      <p class="gate-hint">Sign in with your email and password.</p>
      <input type="email" id="login-email" placeholder="Email" autocomplete="username" autofocus required>
      <input type="password" id="login-pw" placeholder="Password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
      <div class="gate-error" id="login-err" role="alert" aria-live="polite"></div>
      <button type="button" class="gate-link" id="forgot-link">Forgot password?</button>
      <noscript><p class="gate-hint">JavaScript is required.</p></noscript>
    </form>

    <form class="gate-card" id="forgot-form" autocomplete="on" hidden>
      <div class="brand-mark">
        <div class="brand-logo" aria-label="English College">
          <img class="brand-logo-img" src="/assets/img/cel-logo-multicolor.svg" alt="English College">
        </div>
      </div>
      <h1>Reset password</h1>
      <p class="gate-hint">Enter your email and we'll send you a reset link.</p>
      <input type="email" id="forgot-email" placeholder="Email" autocomplete="username" required>
      <button type="submit">Send reset link</button>
      <div class="gate-error" id="forgot-msg" role="status" aria-live="polite"></div>
      <button type="button" class="gate-link" id="forgot-back">Back to sign in</button>
    </form>
  </div>
  <script>
  (function () {
    // The password is verified server-side by the cel-dashboard Worker, which
    // returns a signed session token. We store it in a persistent, Secure,
    // SameSite=Strict cookie so the sign-in survives reloads + restarts.
    function sha256hex(s) {
      return crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)).then(function (buf) {
        return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
      });
    }
    var DISPATCH_URL = (typeof window.CEL_DISPATCH_URL === 'string') ? window.CEL_DISPATCH_URL : '';

    function getReturn() {
      var m = location.search.match(/[?&]return=([^&]+)/);
      if (m) {
        try {
          var dec = decodeURIComponent(m[1]);
          if (dec.indexOf('/') === 0 && dec.indexOf('//') !== 0) return dec;
        } catch (_) {}
      }
      return '/admin/';
    }

    var loginForm = document.getElementById('login-form');
    var emailEl = document.getElementById('login-email');
    var pwEl = document.getElementById('login-pw');
    var errEl = document.getElementById('login-err');
    var btn = loginForm.querySelector('button[type="submit"]');

    loginForm.addEventListener('submit', function (ev) {
      ev.preventDefault();
      errEl.textContent = '';
      var email = emailEl.value.trim().toLowerCase();
      var pw = pwEl.value;
      if (!email || !pw) { errEl.textContent = 'Enter your email and password.'; return; }
      if (!DISPATCH_URL) { errEl.textContent = 'Sign-in is not configured yet.'; return; }
      if (btn) btn.disabled = true;
      // Send SHA256(password), never the plaintext. The Worker hashes again and
      // compares to the stored double-hash; the public hash can't be replayed.
      sha256hex(pw).then(function (inner) {
        return fetch(DISPATCH_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', email: email, inner: inner })
        });
      }).then(function (r) { return r.json().catch(function () { return {}; }); })
        .then(function (j) {
          if (j && j.ok && j.token) {
            document.cookie = 'cel_session=' + j.token + '; Max-Age=1209600; Path=/; Secure; SameSite=Strict';
            location.replace(getReturn());
          } else {
            errEl.textContent = 'Wrong email or password.';
            pwEl.value = '';
            pwEl.focus();
            if (btn) btn.disabled = false;
          }
        }).catch(function () {
          errEl.textContent = 'Could not sign in right now. Please try again.';
          if (btn) btn.disabled = false;
        });
    });

    // ── Forgot password: email a reset link (Worker sends it via Mailgun) ──
    var forgotForm = document.getElementById('forgot-form');
    var forgotEmail = document.getElementById('forgot-email');
    var forgotMsg = document.getElementById('forgot-msg');
    var forgotBtn = forgotForm.querySelector('button[type="submit"]');
    function showForgot(show) {
      loginForm.hidden = show;
      forgotForm.hidden = !show;
      if (show) { forgotMsg.textContent = ''; forgotEmail.value = emailEl.value; forgotEmail.focus(); }
      else { emailEl.focus(); }
    }
    document.getElementById('forgot-link').addEventListener('click', function () { showForgot(true); });
    document.getElementById('forgot-back').addEventListener('click', function () { showForgot(false); });

    forgotForm.addEventListener('submit', function (ev) {
      ev.preventDefault();
      var email = forgotEmail.value.trim().toLowerCase();
      if (!email) return;
      if (!DISPATCH_URL) { forgotMsg.textContent = 'Reset is not configured yet.'; return; }
      if (forgotBtn) forgotBtn.disabled = true;
      // Always the same neutral message — never reveal whether the email is registered.
      var neutral = "If that email is registered, a reset link is on its way. Check your inbox (and spam).";
      fetch(DISPATCH_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'forgot', email: email })
      }).then(function () { forgotMsg.textContent = neutral; })
        .catch(function () { forgotMsg.textContent = neutral; })
        .then(function () { if (forgotBtn) forgotBtn.disabled = false; });
    });
  })();
  </script>
</body>
</html>
