name: Dashboard Forgot Password

# Triggered from the login screen's "Forgot password" form via the Cloudflare
# dispatch proxy. Issues a stateless HMAC reset link and emails it to the
# registered address. No repo write — pure link issuer. Always succeeds so the
# client can show a neutral "if registered, a link is on its way" message.
on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email typed on the login screen'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: dashboard-forgot-${{ inputs.email }}
  cancel-in-progress: false

jobs:
  forgot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Issue reset link
        id: prep
        env:
          INPUT_EMAIL: ${{ inputs.email }}
          RESET_SIGNING_KEY: ${{ secrets.RESET_SIGNING_KEY }}
        run: python3 -m tools.dashboard_users.forgot_password

      - name: Send reset email
        if: steps.prep.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Reset your English College dashboard password
          to: ${{ steps.prep.outputs.recipient }}
          from: English College Dashboard <${{ secrets.MAIL_FROM }}>
          body: |
            Someone requested a password reset for your English College dashboard account.

            Reset your password (this link expires in 1 hour):
            ${{ steps.prep.outputs.reset_url }}

            If you didn't request this, you can safely ignore this email.
