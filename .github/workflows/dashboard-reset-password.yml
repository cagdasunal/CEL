name: Dashboard Reset Password

# Triggered from /reset/ (the email link target) via the Cloudflare dispatch
# proxy. Verifies the stateless HMAC reset token server-side, then updates
# docs/admin/users.json. The token binds the current pwHash, so a completed
# reset invalidates the link (single use, no stored token).
on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Registered email'
        required: true
        type: string
      exp:
        description: 'Unix-seconds expiry from the reset link'
        required: true
        type: string
      sig:
        description: 'HMAC signature from the reset link'
        required: true
        type: string
      new_pw_hash:
        description: 'SHA256(SHA256(utf8(new password))) hex'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: dashboard-users-write
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Apply password reset
        env:
          INPUT_EMAIL: ${{ inputs.email }}
          INPUT_EXP: ${{ inputs.exp }}
          INPUT_SIG: ${{ inputs.sig }}
          INPUT_NEW_PW_HASH: ${{ inputs.new_pw_hash }}
          RESET_SIGNING_KEY: ${{ secrets.RESET_SIGNING_KEY }}
        run: python3 -m tools.dashboard_users.reset_password

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git status --porcelain docs/admin/users.json | grep -q .; then
            echo "no change to commit"
            exit 0
          fi
          git add docs/admin/users.json
          git commit -m "chore(dashboard): reset a user password"
          n=0
          until [ $n -ge 5 ]; do
            if ! git pull --rebase; then
              git rebase --abort 2>/dev/null || true
              n=$((n+1)); sleep $((n * n)); continue
            fi
            if git push; then
              echo "push succeeded on attempt $((n+1))"
              exit 0
            fi
            n=$((n+1)); sleep $((n * n))
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1
