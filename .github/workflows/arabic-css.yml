name: Arabic RTL CSS

on:
  # Manual-only for now (no auto-schedule). Run locally with
  # `python -m tools.arabic_rtl.build --force`, or trigger this workflow on demand
  # from the Actions tab. To restore hourly auto-refresh, re-add the schedule below:
  #   schedule:
  #     - cron: '23 * * * *'
  workflow_dispatch:

concurrency:
  group: push-to-main
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Node is needed only for `npx rtlcss`. The engine itself is stdlib-only,
      # so there is no pip install step.
      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Regenerate cel-arabic.css if source CSS changed
        run: python -m tools.arabic_rtl.build

      - name: Commit and push if changed
        run: |
          git add docs/scripts/cel-arabic.css
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(arabic-css): refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # 5-attempt push retry w/ exponential backoff — guards races against the
          # 15-min content-pipeline cron. Matches update-sitemap-llms.yml.
          n=0
          until [ $n -ge 5 ]; do
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort 2>/dev/null || true
              echo "pull/rebase failed (attempt $((n+1))) — retrying"
              n=$((n+1))
              sleep $((n * n))
              continue
            fi
            if git push; then
              echo "push succeeded on attempt $((n+1))"
              exit 0
            fi
            n=$((n+1))
            echo "push failed on attempt $n, sleeping $((n * n))s"
            sleep $((n * n))
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1

      - name: Notify on failure
        # `failure() || cancelled()` — NOT just failure(): a `timeout-minutes` expiry
        # marks the job `cancelled`, NOT `failed`, so `if: failure()` alone would NOT
        # fire on a timeout. blog-summary-autopilot timed out (cancelled) for 7 straight
        # days with ZERO alerts because of exactly this — the original "hung unnoticed"
        # incident, reopened. None of these workflows use concurrency cancel-in-progress,
        # so `cancelled()` only ever means a timeout or a manual cancel (both worth an alert).
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          # Ensure the ci-failure label exists (idempotent). `gh issue create --label`
          # aborts ATOMICALLY on a missing label → the alert is SILENTLY suppressed.
          # That is the exact bug tracker 138 hit: the label was never created in
          # either repo, so every notify step opened zero issues. Self-heal so the
          # alert works in any repo and survives the label being deleted.
          gh label create ci-failure --repo "${{ github.repository }}" \
            --color B60205 --description "Automated CI/cron failure alerts" --force >/dev/null 2>&1 || true
          TITLE="🔴 ${{ github.workflow }} failed"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NUM=$(gh issue list --repo "${{ github.repository }}" --label ci-failure --state open \
                  --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "${{ github.repository }}" \
              --body "Failed again at $(date -u +%FT%TZ). Run: $URL"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --label ci-failure \
              --body "Scheduled workflow failed. Run: $URL. Auto-updates on repeat failures; close once resolved."
          fi
