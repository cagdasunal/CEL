name: Stress tests (modular core + copywriter + translator)

# The repo's FIRST test-running CI (every other workflow is a task runner). Proves the
# tools.core refactor + the copywriter compose path stayed green, with NO secrets and NO
# spend: the suite deletes the API keys and uses only dry-run / mocked paths.
#
# Scoped to tools/** + the config files so the data-churn crons don't trigger it.

on:
  push:
    branches: [main]   # PRs from branches trigger via pull_request only — no duplicate runs
    paths:
      - "tools/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".importlinter"
      - ".github/workflows/stress-test.yml"
  pull_request:
    paths:
      - "tools/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".importlinter"
      - ".github/workflows/stress-test.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: stress-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stress:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No `env:` secrets on purpose — the harness must run keyless. The conftest also
    # deletes GEMINI_API_KEY / WEBFLOW_API_TOKEN as a spend backstop.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -o pipefail
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Legacy + copywriter suite (-m "not stress")
        # The full non-stress suite must be green (the test_update_log host asserts were
        # corrected 2026-05-25, so the --deselect machinery is gone). lint-imports is NOT run
        # here — the stress step (run_stress.sh, next) lints, and its test_00 re-runs the FULL
        # suite bounding failures, so a NEW failure fails CI.
        run: PYTHONPATH=. python3 -m pytest tools/ -m "not stress" -p no:cacheprovider -q

      - name: Stress harness (-m stress) — regression baseline + shim identity + compose + locale-native QA
        run: STRESS_PY=python3 bash tools/_stress/run_stress.sh
