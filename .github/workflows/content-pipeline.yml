name: Content Pipeline

on:
  schedule:
    - cron: '7,22,37,52 * * * *'   # every 15 min, offset from old weglot-sync cadence
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: content-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Python deps
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Step 1 — Sync Weglot via API
        id: weglot
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEGLOT_PUBLIC_KEY: ${{ secrets.WEGLOT_API_KEY }}
          WEGLOT_PRIVATE_KEY: ${{ secrets.WEGLOT_PRIVATE_KEY }}
        run: python tools/weglot/api_sync.py

      - name: Step 2 — Regenerate sitemap
        if: steps.weglot.outputs.updated == 'true'
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
        run: python tools/generate_master_sitemap.py

      - name: Step 3 — Regenerate llms.txt
        if: steps.weglot.outputs.updated == 'true'
        run: |
          # Serve docs/ (where sitemap.xml now lives) so npx llmstxt gen reads
          # the freshly produced file, not a stale CDN copy.
          python3 -m http.server 8081 --directory docs &
          SERVER_PID=$!
          sleep 2
          LLMS_SITEMAP_URL=http://localhost:8081/sitemap.xml bash tools/generate_llms.sh
          kill $SERVER_PID 2>/dev/null || true

      - name: Step 4a — Log (Weglot updated)
        if: steps.weglot.outputs.updated == 'true'
        run: python tools/weglot/update_log.py --event weglot_update --slugs "${{ steps.weglot.outputs.slugs }}"

      - name: Step 4b — Log (no change)
        if: steps.weglot.outcome == 'success' && steps.weglot.outputs.updated != 'true' && steps.weglot.outputs.error == ''
        run: python tools/weglot/update_log.py --event no_change

      - name: Step 4c — Log (error)
        if: steps.weglot.outputs.error != ''
        run: python tools/weglot/update_log.py --event error --error "${{ steps.weglot.outputs.error }}"

      - name: Step 4d — Check Weglot CSV import status
        if: always()
        timeout-minutes: 3
        continue-on-error: true
        run: |
          python3 -m tools.weglot.check_import_status \
            --csv-dir docs/admin/weglot-imports \
            --out docs/admin/weglot-imports/import-status.json
          if [ -f docs/admin/weglot-imports/import-status.json ]; then
            python3 -c "import json; s=json.load(open('docs/admin/weglot-imports/import-status.json')); print('verdicts:', {c: i['verdict'] for c, i in s['languages'].items()})"
          fi

      - name: Step 4e — Generate HTML status page
        if: always()
        env:
          DASHBOARD_DISPATCH_PROXY_URL: ${{ vars.DASHBOARD_DISPATCH_PROXY_URL }}
        run: python -m tools.weglot.generate_status_page

      - name: Step 4f — Generate offers viewer HTML
        if: always()
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          DASHBOARD_DISPATCH_PROXY_URL: ${{ vars.DASHBOARD_DISPATCH_PROXY_URL }}
        run: python3 -m tools.offers.build_offers_viewer
        continue-on-error: true   # offers viewer regen must NOT block the rest of the 15-min cycle

      - name: Commit & push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weglot-exclusions.json data/weglot-sitemap-exclusions.json data/log-state.json docs/sitemap.xml docs/llms.txt docs/admin/log/index.html docs/admin/translations/index.html docs/admin/index.html docs/assets/css/dashboard.css docs/assets/js/dashboard-config.js docs/admin/offers/index.html docs/admin/summaries/index.html docs/admin/files/index.html docs/admin/weglot-imports/import-status.json 2>/dev/null || true
          git diff --cached --quiet && echo "nothing to commit" || git commit -m "pipeline: run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || echo "push failed (will retry next run)"
