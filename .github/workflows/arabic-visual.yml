name: Arabic RTL Visual Pass (Gemini)

on:
  schedule:
    # Weekly, Monday 05:00 UTC. Only pages whose CSS changed AND not analyzed in >=7d
    # are screenshotted + sent to Gemini (tools/arabic_rtl/visual.py enforces the gate).
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      only:
        description: "Substring filter for /ar/ URLs (e.g. /ar/vancouver) — blank = all eligible"
        required: false
        default: ""
      force:
        description: "Ignore the eligibility gate (re-analyze matched pages now)"
        type: boolean
        default: false

concurrency:
  group: push-to-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # Node is for `npx rtlcss` in the reassembly step (the engine itself is stdlib).
      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Run Gemini visual analysis (eligible /ar/ pages only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS=""
          [ -n "${{ inputs.only }}" ] && ARGS="$ARGS --only ${{ inputs.only }}"
          [ "${{ inputs.force }}" = "true" ] && ARGS="$ARGS --force"
          python -m tools.arabic_rtl.visual $ARGS

      - name: Reassemble cel-arabic.css with the new Gemini layer
        run: python -m tools.arabic_rtl.build --force

      - name: Upload screenshots for review
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arabic-visual-screenshots
          path: data/arabic-visual/screenshots/
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit and push if changed
        run: |
          # screenshots/ is gitignored — only the generated CSS, reports, state, and the
          # reassembled stylesheet are committed.
          git add data/arabic-visual/ docs/scripts/cel-arabic.css
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(arabic-css): Gemini visual pass $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          n=0
          until [ $n -ge 5 ]; do
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort 2>/dev/null || true
              echo "pull/rebase failed (attempt $((n+1))) — retrying"
              n=$((n+1)); sleep $((n * n)); continue
            fi
            if git push; then
              echo "push succeeded on attempt $((n+1))"; exit 0
            fi
            n=$((n+1)); echo "push failed on attempt $n, sleeping $((n * n))s"; sleep $((n * n))
          done
          echo "ERROR: push failed after 5 attempts"; exit 1
