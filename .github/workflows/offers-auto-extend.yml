name: Offers Auto-Extend

on:
  schedule:
    - cron: '17 2 * * *'   # daily 02:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: offers-auto-extend
  cancel-in-progress: false

jobs:
  extend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run auto-extend (live)
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
        run: python3 -m tools.offers.auto_extend

      - name: Verify post-state (no item ends in <23h)
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
        run: |
          set -eo pipefail   # else a crash in auto_extend is masked by `| tee` (exit code lost)
          python3 -m tools.offers.auto_extend --dry-run --threshold-hours 23 | tee /tmp/post-verify.log

      - name: Gate
        run: |
          grep -q "PLAN: 0 items" /tmp/post-verify.log

      - name: Truncate logs (race-free — single-instance cron)
        if: always()
        run: |
          # The auto-extend workflow is single-instance (concurrency:
          # offers-auto-extend, cancel-in-progress: false; cron + manual
          # dispatch only). It is the ONLY workflow that truncates the
          # JSONL log files — concurrent dashboard workflows skip
          # truncation to avoid rebase conflicts on overlapping diffs.
          # Tracker 077 M1.
          for f in data/offers-edit-log.json data/offers-extend-log.json; do
            if [ ! -f "$f" ]; then continue; fi
            case "$f" in
              data/offers-edit-log.json)   keep=500 ;;
              data/offers-extend-log.json) keep=200 ;;
            esac
            tail -n "$keep" "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - name: Commit log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/offers-extend-log.json data/offers-edit-log.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no log changes to commit"
            exit 0
          fi
          git commit -m "chore(offers): auto-extend $(date -u +%Y-%m-%d)"
          # 5-attempt push retry with exponential backoff. See offers-edit-item.yml
          # for the rationale. Tracker 077 M2.
          n=0
          until [ $n -ge 5 ]; do
            if ! git pull --rebase; then
              git rebase --abort 2>/dev/null || true
              echo "rebase failed (attempt $((n+1))) — retrying"
              n=$((n+1))
              sleep $((n * n))
              continue
            fi
            if git push; then
              echo "push succeeded on attempt $((n+1))"
              exit 0
            fi
            n=$((n+1))
            echo "push failed on attempt $n, sleeping $((n * n))s"
            sleep $((n * n))
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1

      - name: Notify on failure
        # `failure() || cancelled()` — NOT just failure(): a `timeout-minutes` expiry
        # marks the job `cancelled`, NOT `failed`, so `if: failure()` alone would NOT
        # fire on a timeout. blog-summary-autopilot timed out (cancelled) for 7 straight
        # days with ZERO alerts because of exactly this — the original "hung unnoticed"
        # incident, reopened. None of these workflows use concurrency cancel-in-progress,
        # so `cancelled()` only ever means a timeout or a manual cancel (both worth an alert).
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          # Ensure the ci-failure label exists (idempotent). `gh issue create --label`
          # aborts ATOMICALLY on a missing label → the alert is SILENTLY suppressed.
          # That is the exact bug tracker 138 hit: the label was never created in
          # either repo, so every notify step opened zero issues. Self-heal so the
          # alert works in any repo and survives the label being deleted.
          gh label create ci-failure --repo "${{ github.repository }}" \
            --color B60205 --description "Automated CI/cron failure alerts" --force >/dev/null 2>&1 || true
          TITLE="🔴 ${{ github.workflow }} failed"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NUM=$(gh issue list --repo "${{ github.repository }}" --label ci-failure --state open \
                  --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "${{ github.repository }}" \
              --body "Failed again at $(date -u +%FT%TZ). Run: $URL"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --label ci-failure \
              --body "Scheduled workflow failed. Run: $URL. Auto-updates on repeat failures; close once resolved."
          fi
