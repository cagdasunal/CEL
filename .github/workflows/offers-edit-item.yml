name: Offers Edit Item

# Triggered from the dashboard's auto-extend-days inline editor.
# The dashboard issues a workflow_dispatch with item_id + days inputs.
on:
  workflow_dispatch:
    inputs:
      item_id:
        description: 'Webflow CMS item ID'
        required: true
        type: string
      days:
        description: 'auto-extend-days value (integer >= 0)'
        required: true
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: offers-edit-item-${{ inputs.item_id }}
  cancel-in-progress: false

jobs:
  edit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Apply auto-extend-days edit
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          INPUT_ITEM_ID: ${{ inputs.item_id }}
          INPUT_DAYS: ${{ inputs.days }}
        run: python3 -m tools.offers.edit_item

      - name: Commit log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git status --porcelain data/offers-edit-log.json | grep -q .; then
            echo "no log changes to commit"
            exit 0
          fi
          git add data/offers-edit-log.json
          git commit -m "chore(offers): edit item ${{ inputs.item_id }} auto-extend-days=${{ inputs.days }}"
          # 5-attempt push retry with exponential backoff.
          # JSONL log format makes rebase conflicts extremely rare (each run
          # appends a distinct line at EOF — non-overlapping diffs auto-merge).
          # The retry handles the residual race between pull --rebase and push,
          # plus any transient remote-side rejection. Tracker 077 M2.
          n=0
          until [ $n -ge 5 ]; do
            if ! git pull --rebase; then
              git rebase --abort 2>/dev/null || true
              echo "rebase failed (attempt $((n+1))) — retrying"
              n=$((n+1))
              sleep $((n * n))
              continue
            fi
            if git push; then
              echo "push succeeded on attempt $((n+1))"
              exit 0
            fi
            n=$((n+1))
            echo "push failed on attempt $n, sleeping $((n * n))s"
            sleep $((n * n))
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1

      - name: Notify on failure
        # `failure() || cancelled()` — NOT just failure(): a `timeout-minutes` expiry
        # marks the job `cancelled`, NOT `failed`, so `if: failure()` alone would NOT
        # fire on a timeout. blog-summary-autopilot timed out (cancelled) for 7 straight
        # days with ZERO alerts because of exactly this — the original "hung unnoticed"
        # incident, reopened. None of these workflows use concurrency cancel-in-progress,
        # so `cancelled()` only ever means a timeout or a manual cancel (both worth an alert).
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          # Ensure the ci-failure label exists (idempotent). `gh issue create --label`
          # aborts ATOMICALLY on a missing label → the alert is SILENTLY suppressed.
          # That is the exact bug tracker 138 hit: the label was never created in
          # either repo, so every notify step opened zero issues. Self-heal so the
          # alert works in any repo and survives the label being deleted.
          gh label create ci-failure --repo "${{ github.repository }}" \
            --color B60205 --description "Automated CI/cron failure alerts" --force >/dev/null 2>&1 || true
          TITLE="🔴 ${{ github.workflow }} failed"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NUM=$(gh issue list --repo "${{ github.repository }}" --label ci-failure --state open \
                  --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "${{ github.repository }}" \
              --body "Failed again at $(date -u +%FT%TZ). Run: $URL"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --label ci-failure \
              --body "Scheduled workflow failed. Run: $URL. Auto-updates on repeat failures; close once resolved."
          fi
