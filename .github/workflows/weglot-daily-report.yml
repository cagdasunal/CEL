name: Weglot Daily Report

on:
  schedule:
    - cron: '7 6 * * *'  # 6:07 AM UTC daily (9:07 AM Turkey)
  workflow_dispatch:

concurrency:
  group: push-to-main
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Check for pending CSV
        id: check
        run: |
          if [ -f data/weglot.csv ]; then
            LINES=$(tail -n +2 data/weglot.csv | wc -l | tr -d ' ')
            echo "has_csv=true" >> $GITHUB_OUTPUT
            echo "count=$LINES" >> $GITHUB_OUTPUT
            echo "Found $LINES pending exclusions"
          else
            echo "has_csv=false" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
            echo "No pending exclusions"
          fi

      - name: Create GitHub Issue
        if: steps.check.outputs.has_csv == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=${{ steps.check.outputs.count }}
          DATE=$(date -u +"%Y-%m-%d")

          # Build the CSV table for the issue body
          CSV_TABLE=""
          while IFS=';' read -r id type value languages displayed behavior; do
            if [ "$type" = "\"Is exactly\"" ] || [ "$type" = "Is exactly" ]; then
              CSV_TABLE="${CSV_TABLE}| ${value} | ${languages} |\n"
            fi
          done < data/weglot.csv

          BODY=$(cat <<EOF
          ## Weglot Exclusion Import Needed

          **${COUNT} new blog post(s)** need translation exclusions in Weglot.

          ### How to import
          1. Download CSV: [weglot.csv](https://sitemap.englishcollege.com/weglot.csv)
          2. Go to [Weglot Translation Exclusions](https://dashboard.weglot.com/workspaces/w-6bc645f5ad/projects/cel/settings/exclusions)
          3. Click **Actions** → **Import** → Upload the CSV
          4. Done — next sync will auto-confirm and clear the CSV

          ### Posts to exclude

          | URL | Excluded Languages |
          |---|---|
          $(echo -e "$CSV_TABLE")

          ---
          *Auto-generated by Weglot Daily Report*
          EOF
          )

          gh issue create \
            --repo cagdasunal/englishcollege \
            --title "Weglot: ${COUNT} exclusion(s) pending import ($DATE)" \
            --body "$BODY" \
            --label "weglot"

      - name: All clear
        if: steps.check.outputs.has_csv == 'false'
        run: echo "No pending exclusions. All synced with Weglot."

      - name: Stamp Weglot daily check
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .weglot-last-check
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .weglot-last-check
          git diff --cached --quiet && echo "No stamp change" && exit 0
          git commit -m "chore: stamp weglot daily check ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          # 5-attempt push retry w/ exponential backoff — guards transient
          # actions/checkout@v6 credential-read flakes. Matches offers-*.yml.
          n=0
          until [ $n -ge 5 ]; do
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort 2>/dev/null || true
              echo "pull/rebase failed (attempt $((n+1))) — retrying"
              n=$((n+1))
              sleep $((n * n))
              continue
            fi
            if git push; then
              echo "push succeeded on attempt $((n+1))"
              exit 0
            fi
            n=$((n+1))
            echo "push failed on attempt $n, sleeping $((n * n))s"
            sleep $((n * n))
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1

      - name: Notify on failure
        # `failure() || cancelled()` — NOT just failure(): a `timeout-minutes` expiry
        # marks the job `cancelled`, NOT `failed`, so `if: failure()` alone would NOT
        # fire on a timeout. blog-summary-autopilot timed out (cancelled) for 7 straight
        # days with ZERO alerts because of exactly this — the original "hung unnoticed"
        # incident, reopened. None of these workflows use concurrency cancel-in-progress,
        # so `cancelled()` only ever means a timeout or a manual cancel (both worth an alert).
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          # Ensure the ci-failure label exists (idempotent). `gh issue create --label`
          # aborts ATOMICALLY on a missing label → the alert is SILENTLY suppressed.
          # That is the exact bug tracker 138 hit: the label was never created in
          # either repo, so every notify step opened zero issues. Self-heal so the
          # alert works in any repo and survives the label being deleted.
          gh label create ci-failure --repo "${{ github.repository }}" \
            --color B60205 --description "Automated CI/cron failure alerts" --force >/dev/null 2>&1 || true
          TITLE="🔴 ${{ github.workflow }} failed"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NUM=$(gh issue list --repo "${{ github.repository }}" --label ci-failure --state open \
                  --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "${{ github.repository }}" \
              --body "Failed again at $(date -u +%FT%TZ). Run: $URL"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --label ci-failure \
              --body "Scheduled workflow failed. Run: $URL. Auto-updates on repeat failures; close once resolved."
          fi
