name: Update Sitemap & LLMs.txt

on:
  schedule:
    # Every 6 hours at 00:00, 06:00, 12:00, and 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Manual trigger via GitHub UI

concurrency:
  group: push-to-main
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # node-version is intentionally 20 — this is the Node runtime for
      # the `llmstxt` npm package invoked by tools/generate_llms.sh, NOT
      # the deprecated GitHub Actions action runtime. The action itself
      # (actions/setup-node@v5) is Node.js 24 native. Do not bump to 22/24
      # without testing `npx llmstxt` compatibility first.
      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate sitemap.xml
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
        run: python tools/generate_master_sitemap.py

      - name: Generate llms.txt from local sitemap
        run: |
          # Serve docs/ (where sitemap.xml now lives) so npx llmstxt gen reads
          # the freshly produced file, not a stale CDN copy.
          python3 -m http.server 8081 --bind 127.0.0.1 --directory docs &
          HTTP_PID=$!
          # Ensure the server is killed even if generate_llms.sh exits non-zero
          # (bash -e would abort the step before the explicit kill below).
          trap 'kill "$HTTP_PID" 2>/dev/null || true' EXIT
          sleep 2
          LLMS_SITEMAP_URL=http://localhost:8081/sitemap.xml bash tools/generate_llms.sh
          kill "$HTTP_PID" 2>/dev/null || true

      - name: Check sitemap URLs
        run: python tools/check_sitemap_urls.py --posts-only
        continue-on-error: true

      - name: Stage data changes
        run: |
          git add docs/sitemap.xml docs/llms.txt

      - name: Update log.txt (always)
        run: |
          export CHANGED="$(git diff --cached --name-only 2>/dev/null | tr '\n' ' ')"
          python3 tools/update_log.py
          git add docs/log.txt

      - name: Commit and push if changed
        run: |
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "Auto-update sitemap.xml and llms.txt ($TIMESTAMP)"
          # 5-attempt push retry w/ exponential backoff — guards transient
          # actions/checkout@v6 credential-read flakes. Matches offers-*.yml.
          n=0
          until [ $n -ge 5 ]; do
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort 2>/dev/null || true
              echo "pull/rebase failed (attempt $((n+1))) — retrying"
              n=$((n+1))
              sleep $((n * n))
              continue
            fi
            if git push; then
              echo "push succeeded on attempt $((n+1))"
              exit 0
            fi
            n=$((n+1))
            echo "push failed on attempt $n, sleeping $((n * n))s"
            sleep $((n * n))
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          # Ensure the ci-failure label exists (idempotent). `gh issue create --label`
          # aborts ATOMICALLY on a missing label → the alert is SILENTLY suppressed.
          # That is the exact bug tracker 138 hit: the label was never created in
          # either repo, so every notify step opened zero issues. Self-heal so the
          # alert works in any repo and survives the label being deleted.
          gh label create ci-failure --repo "${{ github.repository }}" \
            --color B60205 --description "Automated CI/cron failure alerts" --force >/dev/null 2>&1 || true
          TITLE="🔴 ${{ github.workflow }} failed"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NUM=$(gh issue list --repo "${{ github.repository }}" --label ci-failure --state open \
                  --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "${{ github.repository }}" \
              --body "Failed again at $(date -u +%FT%TZ). Run: $URL"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --label ci-failure \
              --body "Scheduled workflow failed. Run: $URL. Auto-updates on repeat failures; close once resolved."
          fi
