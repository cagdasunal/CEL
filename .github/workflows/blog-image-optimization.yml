name: Blog Image Optimization

on:
  schedule:
    # 11:00 UTC = 03:00 PST / 04:00 PDT — both deep night in San Diego.
    # Picked off the 00:00 UTC peak documented in GitHub Actions community
    # threads (cron jitter is worst at midnight UTC). Locked plan §6.
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      posts:
        description: "Comma-separated post slugs to optimize (default: ALL)"
        required: false
        type: string
        default: ""
  # Triggered by a Webflow `collection_item_publish` webhook → forwarded
  # via a Cloudflare Worker (or any HMAC-validating relay) to GitHub's
  # /repos/{owner}/{repo}/dispatches endpoint with event_type
  # `webflow_blog_published` and a JSON payload `{"slug": "<post-slug>"}`.
  # See docs/blog-image-optimization-setup.md for the receiver setup.
  repository_dispatch:
    types: [webflow_blog_published]

permissions:
  contents: write
  issues: write

concurrency:
  group: blog-image-optimization
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install image-processing deps
        run: |
          python -m pip install --upgrade pip
          # Versions match scripts/optimize_blog_richtext_images.py local test bed
          # (Pillow 12.2.0 + pillow-avif-plugin 1.5.5). Forward-compatible within
          # major versions — adjust if upstream breaks.
          pip install "Pillow>=12,<13" "pillow-avif-plugin>=1.5.5"

      - name: Resolve --posts filter (manual dispatch or webhook payload)
        id: filter
        run: |
          # workflow_dispatch.inputs.posts (manual) — optional comma list
          # repository_dispatch.client_payload.slug (webhook) — single slug
          POSTS_INPUT="${{ github.event.inputs.posts }}"
          DISPATCH_SLUG="${{ github.event.client_payload.slug }}"
          if [ -n "$POSTS_INPUT" ]; then
            echo "posts_arg=--posts $POSTS_INPUT" >> "$GITHUB_OUTPUT"
            echo "Filter: manual posts=$POSTS_INPUT"
          elif [ -n "$DISPATCH_SLUG" ]; then
            echo "posts_arg=--posts $DISPATCH_SLUG" >> "$GITHUB_OUTPUT"
            echo "Filter: webhook slug=$DISPATCH_SLUG"
          else
            echo "posts_arg=" >> "$GITHUB_OUTPUT"
            echo "Filter: ALL posts (no filter)"
          fi

      - name: Run blog-image optimizer (--apply --auto-publish)
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
        run: |
          mkdir -p data/blog-richtext-backup
          touch data/blog-optimization-log.jsonl
          # --auto-publish is the DEFAULT but stated explicitly for clarity.
          # The optimizer enforces the safeguard internally:
          #   only items with lastPublished != null AND isDraft=False
          #   AND isArchived=False are published. Drafts are NEVER published.
          python scripts/optimize_blog_richtext_images.py \
            --site cel \
            --apply \
            --auto-publish \
            ${{ steps.filter.outputs.posts_arg }} \
            --log-jsonl data/blog-optimization-log.jsonl \
            --backup-dir data/blog-richtext-backup

      - name: Commit + push state
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Pull latest first to avoid conflicts with content-pipeline.yml
          # (every-15-min) running concurrently.
          git pull --rebase --autostash origin main || true
          git add data/blog-optimization-log.jsonl \
                  data/blog-richtext-backup/ \
                  sites/cel/shared/uploaded_assets.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(blog-images): nightly AVIF optimization $(date -u +%Y-%m-%d)"
          # 5-attempt push retry w/ exponential backoff — guards transient
          # actions/checkout@v6 credential-read flakes + concurrent
          # content-pipeline pushes. Matches offers-*.yml.
          n=0
          until [ $n -ge 5 ]; do
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort 2>/dev/null || true
              echo "pull/rebase failed (attempt $((n+1))) — retrying"
              n=$((n+1))
              sleep $((n * n))
              continue
            fi
            if git push origin main; then
              echo "push succeeded on attempt $((n+1))"
              exit 0
            fi
            n=$((n+1))
            echo "push failed on attempt $n, sleeping $((n * n))s"
            sleep $((n * n))
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          # Ensure the ci-failure label exists (idempotent). `gh issue create --label`
          # aborts ATOMICALLY on a missing label → the alert is SILENTLY suppressed.
          # That is the exact bug tracker 138 hit: the label was never created in
          # either repo, so every notify step opened zero issues. Self-heal so the
          # alert works in any repo and survives the label being deleted.
          gh label create ci-failure --repo "${{ github.repository }}" \
            --color B60205 --description "Automated CI/cron failure alerts" --force >/dev/null 2>&1 || true
          TITLE="🔴 ${{ github.workflow }} failed"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NUM=$(gh issue list --repo "${{ github.repository }}" --label ci-failure --state open \
                  --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "${{ github.repository }}" \
              --body "Failed again at $(date -u +%FT%TZ). Run: $URL"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --label ci-failure \
              --body "Scheduled workflow failed. Run: $URL. Auto-updates on repeat failures; close once resolved."
          fi
