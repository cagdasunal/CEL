name: Summary script (Webflow CMS + landing pages → Weglot CSVs)

# Manual trigger only. Default inputs run in dry-run mode (no API calls, no
# Webflow writes — produces JSONL batch payload + Markdown report as artifacts).
#
# Requires repo secrets:
#   - WEBFLOW_API_TOKEN  (already used by fidelo-sync.yml)
#   - GEMINI_API_KEY     (Google Gemini 3.1 Pro Batch API; tracker-091 migration)
#
# See tools/summary/README.md for pre-execution checklist.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Subcommand to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - generate-english
          - audit
          - translate
          - all
      dry_run:
        description: "Dry-run (no API calls, no Webflow writes). Disable only when you've reviewed dry-run output."
        required: true
        default: true
        type: boolean
      sync:
        description: "Instant mode (generate-english): synchronous generateContent, no Batch API ≤24h wait. For fast testing + small runs. Leave false for the full catalog (Batch)."
        required: false
        default: false
        type: boolean
      collection_filter:
        description: "Filter to one collection (blog | courses | housing_new). Leave blank for all."
        required: false
        default: ""
        type: string
      locale_filter:
        description: "Filter to one locale (en | de | fr | es | it | pt | ko | ja | ar). Leave blank for all."
        required: false
        default: ""
        type: string
      limit:
        description: "Cap items processed (integer). Leave blank for unlimited."
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: summary-script
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h — matches GHA free-tier hard cap; covers realistic Gemini batch sizes (1-4h typical, 24h SLA). For batches expected to exceed 6h, run translate phase separately with --from-run pointing at the prior generate-english run dir.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -o pipefail
          python3 -m pip install --upgrade pip
          pip install -r tools/summary/requirements.txt

      - name: Run summary script
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODE: ${{ inputs.mode }}
          DRY_RUN: ${{ inputs.dry_run }}
          SYNC: ${{ inputs.sync }}
          COLLECTION_FILTER: ${{ inputs.collection_filter }}
          LOCALE_FILTER: ${{ inputs.locale_filter }}
          LIMIT: ${{ inputs.limit }}
        run: |
          set -o pipefail
          ARGS="$MODE"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          else
            ARGS="$ARGS --no-dry-run"
          fi
          if [ "$SYNC" = "true" ]; then
            ARGS="$ARGS --sync"
          fi
          if [ -n "$COLLECTION_FILTER" ]; then
            ARGS="$ARGS --collection $COLLECTION_FILTER"
          fi
          if [ -n "$LOCALE_FILTER" ]; then
            ARGS="$ARGS --locale $LOCALE_FILTER"
          fi
          if [ -n "$LIMIT" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi
          echo "Running: python3 -m tools.summary $ARGS"
          python3 -m tools.summary $ARGS 2>&1 | tee /tmp/summary-stdout.log
          rc=${PIPESTATUS[0]}
          exit $rc

      - name: Upload dry-run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: summary-dryrun-${{ github.run_id }}
          path: |
            data/seo-intel/summary-dryrun/
            /tmp/summary-stdout.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit CSV + static-summaries changes (live runs only)
        if: ${{ inputs.dry_run == false }}
        run: |
          set -o pipefail
          # Path matches config.WEGLOT_IMPORTS_DIR (tracker-089 C-1). Captures both
          # the per-locale CSVs written by translate phase AND the static-page
          # Markdown files written by generate-english phase
          # (static-summaries/<slug>.summary.md for manual paste into Webflow Designer).
          if [ -z "$(git status --porcelain docs/admin/weglot-imports/)" ]; then
            echo "No CSV or static-summary changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/admin/weglot-imports/
          git commit -m "chore(summary): refresh Weglot CSVs + static summaries ($(date -u +%Y-%m-%d))"
          git push
