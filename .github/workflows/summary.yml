name: Summary script (Webflow CMS + landing pages → Weglot CSVs)

# Manual trigger only. Default inputs run in dry-run mode (no API calls, no
# Webflow writes — produces JSONL batch payload + Markdown report as artifacts).
#
# Requires repo secrets:
#   - WEBFLOW_API_TOKEN  (already used by fidelo-sync.yml)
#   - GEMINI_API_KEY     (Google Gemini 3.1 Pro Batch API; tracker-091 migration)
#
# See tools/summary/README.md for pre-execution checklist.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Subcommand to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - generate-english
          - audit
          - translate
          - all
          - cancel-batch     # tracker-097: stop an orphaned Gemini batch (still billing)
          - retrieve-batch   # tracker-097: reclaim a submitted batch's results by id
      dry_run:
        description: "Dry-run (no API calls, no Webflow writes). Disable only when you've reviewed dry-run output."
        required: true
        default: true
        type: boolean
      confirm_cost:
        description: "generate-english LIVE: authorize a paid run over the confirm threshold. Leave false to see the projected cost first (pilot-first; no batch submitted)."
        required: false
        default: false
        type: boolean
      batch_id:
        description: "cancel-batch / retrieve-batch: the Gemini batch resource name. Leave blank to use the last persisted submit."
        required: false
        default: ""
        type: string
      sync:
        description: "Instant mode (generate-english): synchronous generateContent, no Batch API ≤24h wait. For fast testing + small runs. Leave false for the full catalog (Batch)."
        required: false
        default: false
        type: boolean
      collection_filter:
        description: "Filter to one collection (blog | courses | housing_new). Leave blank for all."
        required: false
        default: ""
        type: string
      exclude_blog:
        description: "Skip the blog collection (tracker-096 'except Blog Posts'). Runs static + courses + housing without regenerating blog."
        required: false
        default: false
        type: boolean
      locale_filter:
        description: "Filter to one locale (en | de | fr | es | it | pt | ko | ja | ar). Leave blank for all."
        required: false
        default: ""
        type: string
      limit:
        description: "Cap items processed (integer). Leave blank for unlimited."
        required: false
        default: ""
        type: string
      from_run:
        description: "translate / link-blogs: repo-relative dir holding a committed en-summaries.json (e.g. data/seo-intel/summary-dryrun/<ts>). Required for a standalone translate dispatch — out-dir is fresh per run, so without this translate finds no manifest and no-ops."
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: summary-script
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h — matches GHA free-tier hard cap; covers realistic Gemini batch sizes (1-4h typical, 24h SLA). For batches expected to exceed 6h, run translate phase separately with --from-run pointing at the prior generate-english run dir.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -o pipefail
          python3 -m pip install --upgrade pip
          pip install -r tools/summary/requirements.txt

      - name: Run summary script
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODE: ${{ inputs.mode }}
          DRY_RUN: ${{ inputs.dry_run }}
          SYNC: ${{ inputs.sync }}
          CONFIRM_COST: ${{ inputs.confirm_cost }}
          EXCLUDE_BLOG: ${{ inputs.exclude_blog }}
          COLLECTION_FILTER: ${{ inputs.collection_filter }}
          LOCALE_FILTER: ${{ inputs.locale_filter }}
          LIMIT: ${{ inputs.limit }}
          BATCH_ID: ${{ inputs.batch_id }}
          FROM_RUN: ${{ inputs.from_run }}
        run: |
          set -o pipefail
          # Bash array, not a string: every element is passed as one quoted argv
          # word via "${ARGS[@]}", so a dispatch input containing spaces/globs/shell
          # metacharacters can't word-split or inject (review 103 F3).
          ARGS=("$MODE")
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          else
            ARGS+=(--no-dry-run)
          fi
          if [ "$SYNC" = "true" ]; then
            ARGS+=(--sync)
          fi
          if [ "$CONFIRM_COST" = "true" ]; then
            ARGS+=(--confirm-cost)
          fi
          if [ "$EXCLUDE_BLOG" = "true" ]; then
            ARGS+=(--exclude-blog)
          fi
          if [ -n "$COLLECTION_FILTER" ]; then
            ARGS+=(--collection "$COLLECTION_FILTER")
          fi
          if [ -n "$LOCALE_FILTER" ]; then
            ARGS+=(--locale "$LOCALE_FILTER")
          fi
          if [ -n "$LIMIT" ]; then
            ARGS+=(--limit "$LIMIT")
          fi
          if [ -n "$BATCH_ID" ]; then
            ARGS+=(--batch-id "$BATCH_ID")
          fi
          if [ -n "$FROM_RUN" ]; then
            ARGS+=(--from-run "$FROM_RUN")
          fi
          echo "Running: python3 -m tools.summary ${ARGS[*]}"
          python3 -m tools.summary "${ARGS[@]}" 2>&1 | tee /tmp/summary-stdout.log
          rc=${PIPESTATUS[0]}
          exit $rc

      - name: Cancel orphaned Gemini batch on cancel/failure (live runs only)
        # H1 (2026-05-23): a submitted Gemini Batch keeps processing + BILLING after the
        # GitHub-Actions run is cancelled (confirmed: a 2h33m-cancelled run left a batch
        # that ran to completion). On cancel/failure of a live run, stop it via the
        # persisted last-batch id. Belt-and-suspenders with the in-process KeyboardInterrupt
        # handler in batch_runner.wait_for_batch (which the GHA grace period may cut short).
        if: ${{ (cancelled() || failure()) && inputs.dry_run == false }}
        timeout-minutes: 2  # bound the cleanup so a hung Gemini API call can't run unbounded during GHA teardown (mirrors retrieve-batch's timeout)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -m tools.summary cancel-batch \
            || echo "no orphaned batch to cancel (or already in a terminal state)"

      - name: Upload dry-run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: summary-dryrun-${{ github.run_id }}
          path: |
            data/seo-intel/summary-dryrun/
            /tmp/summary-stdout.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit CSVs + static summaries + idempotency state (live runs only)
        if: ${{ inputs.dry_run == false }}
        run: |
          set -o pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # docs/admin/weglot-imports/ matches config.WEGLOT_IMPORTS_DIR (tracker-089 C-1):
          # the per-locale CSVs (translate phase) + static-page Markdown (generate phase).
          git add docs/admin/weglot-imports/
          # tracker-097 RC3: persist the idempotency state + translation memory + last-batch
          # id ACROSS runs. Without committing summary-state.json, every GHA run started with
          # empty state and re-billed every unchanged item. Stage only if present (a sync run
          # or a phase that didn't write one leaves some absent).
          for f in \
            data/seo-intel/summary-state.json \
            data/seo-intel/translation-memory.json \
            data/seo-intel/summary-last-batch.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          # tracker-100: ALSO commit the freshly-generated en-summaries.json. Without this
          # the dashboard (content-pipeline.yml -> generate_status_page) only ever sees the
          # last MANUALLY-committed run, so /admin/#summaries was frozen at 2026-05-21 even
          # as the page regenerated daily. Stage only the newest run's file (lexical = chrono)
          # to keep the repo lean; the full run dir is preserved as a 14-day artifact above.
          latest_summaries=$(ls -1 data/seo-intel/summary-dryrun/*/en-summaries.json 2>/dev/null | sort | tail -1 || true)
          [ -n "$latest_summaries" ] && git add "$latest_summaries" || true
          if git diff --cached --quiet; then
            echo "No CSV / static-summary / state changes to commit."
            exit 0
          fi
          git commit -m "chore(summary): refresh CSVs + static summaries + idempotency state ($(date -u +%Y-%m-%d))"
          git push
