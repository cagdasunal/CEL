# DISABLED 2026-04-22 — superseded by content-pipeline.yml. Re-enable by uncommenting the schedule block.
name: Weglot Exclusion Sync

on:
  # schedule:
  #   - cron: '3,18,33,48 * * * *'
  workflow_dispatch:

concurrency:
  group: push-to-main
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  sync-exclusions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Weglot Exclusions
        id: sync
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEGLOT_API_KEY: ${{ secrets.WEGLOT_API_KEY }}
        run: python3 tools/weglot/sync_exclusions.py

      - name: Regenerate Sitemap
        if: steps.sync.outputs.changes_made == 'true'
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
        run: python3 tools/generate_master_sitemap.py

      - name: Set up Node.js 20 (for llms.txt regeneration)
        if: steps.sync.outputs.changes_made == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Regenerate llms.txt from updated sitemap
        if: steps.sync.outputs.changes_made == 'true'
        run: |
          # Use local sitemap.xml (just generated above) so llms.txt is always in sync.
          python3 -m http.server 8081 --bind 127.0.0.1 &
          HTTP_PID=$!
          # Ensure the server is killed even if generate_llms.sh exits non-zero
          # (bash -e would abort the step before the explicit kill below).
          trap 'kill "$HTTP_PID" 2>/dev/null || true' EXIT
          sleep 2
          LLMS_SITEMAP_URL=http://localhost:8081/sitemap.xml bash tools/generate_llms.sh
          kill "$HTTP_PID" 2>/dev/null || true

      - name: Stage data changes
        if: steps.sync.outputs.changes_made == 'true'
        run: |
          git add data/weglot-exclusions.json data/weglot-sitemap-exclusions.json sitemap.xml llms.txt
          # Sync CSV: copy to root if exists, delete root if data CSV was cleared
          if [ -f data/weglot.csv ]; then
            cp data/weglot.csv weglot.csv
          else
            rm -f weglot.csv
          fi
          git add data/weglot.csv weglot.csv 2>/dev/null || true

      - name: Update log.txt (always)
        run: |
          export CHANGED="$(git diff --cached --name-only 2>/dev/null | tr '\n' ' ')"
          python3 tools/update_log.py
          git add log.txt

      - name: Commit & Push
        run: |
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: sync weglot exclusions ($TIMESTAMP)

          New exclusions: ${{ steps.sync.outputs.new_exclusions || 0 }}"
          # 5-attempt push retry w/ exponential backoff — guards transient
          # actions/checkout@v6 credential-read flakes. Matches offers-*.yml.
          n=0
          until [ $n -ge 5 ]; do
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort 2>/dev/null || true
              echo "pull/rebase failed (attempt $((n+1))) — retrying"
              n=$((n+1))
              sleep $((n * n))
              continue
            fi
            if git push; then
              echo "push succeeded on attempt $((n+1))"
              exit 0
            fi
            n=$((n+1))
            echo "push failed on attempt $n, sleeping $((n * n))s"
            sleep $((n * n))
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1

      - name: Notify on failure
        # `failure() || cancelled()` — NOT just failure(): a `timeout-minutes` expiry
        # marks the job `cancelled`, NOT `failed`, so `if: failure()` alone would NOT
        # fire on a timeout. blog-summary-autopilot timed out (cancelled) for 7 straight
        # days with ZERO alerts because of exactly this — the original "hung unnoticed"
        # incident, reopened. None of these workflows use concurrency cancel-in-progress,
        # so `cancelled()` only ever means a timeout or a manual cancel (both worth an alert).
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          # Ensure the ci-failure label exists (idempotent). `gh issue create --label`
          # aborts ATOMICALLY on a missing label → the alert is SILENTLY suppressed.
          # That is the exact bug tracker 138 hit: the label was never created in
          # either repo, so every notify step opened zero issues. Self-heal so the
          # alert works in any repo and survives the label being deleted.
          gh label create ci-failure --repo "${{ github.repository }}" \
            --color B60205 --description "Automated CI/cron failure alerts" --force >/dev/null 2>&1 || true
          TITLE="🔴 ${{ github.workflow }} failed"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NUM=$(gh issue list --repo "${{ github.repository }}" --label ci-failure --state open \
                  --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "${{ github.repository }}" \
              --body "Failed again at $(date -u +%FT%TZ). Run: $URL"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --label ci-failure \
              --body "Scheduled workflow failed. Run: $URL. Auto-updates on repeat failures; close once resolved."
          fi
